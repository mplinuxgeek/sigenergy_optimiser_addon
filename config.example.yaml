  notification_service: notify.home_users
  notify_daily_summary: true
  daily_summary_time: '23:55'
  notify_morning_summary: true
  morning_summary_time: 07:30
  sigenergy_config_entry_id: '01K6455MZWEDS15Y2QTCBRB35D'
  enable_daily_autotune: true
  autotune_run_hour: 0
  autotune_target_net: 2.0
  autotune_min_soc_hard_floor: 2.5
  autotune_min_sunrise_soc: 2.5
