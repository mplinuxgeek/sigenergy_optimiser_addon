name: "SigEnergy Optimiser"
description: "Battery/solar optimiser for SigEnergy inverters with Amber Electric pricing. Provides a web UI on port 8000."
version: "1.0.3"
slug: "sigenergy_optimiser"
init: false
homeassistant: "2023.1.0"

arch:
  - aarch64
  - amd64
  - armv7

ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "Web UI"

map:
  - config:rw

options:
  log_level: info
schema:
  log_level: "list(trace|debug|info|notice|warning|error|fatal)"

image: "ghcr.io/mplinuxgeek/sigenergy_optimiser_addon"
